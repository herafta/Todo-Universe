<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>To-Do Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg:#fefefe; --fg:#1f2937; --card-fg:#1f2937; }
    [data-theme="night"] { --bg:#0c0c1b; --fg:#f3f4f6; --card-fg:#f3f4f6; }
    body{ background:var(--bg); color:var(--fg); min-height:100vh; overflow:hidden; }
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(#fff 1px,transparent 1px) 0 0/3px 3px,radial-gradient(#fff 1px,transparent 1px)1.5px 1.5px/3px 3px;opacity:.2;animation:drift 120s linear infinite;pointer-events:none;}
    @keyframes drift{from{transform:translateY(0);}to{transform:translateY(1000px);}}
    @media(prefers-reduced-motion:reduce){body::before{animation:none;}}
  </style>
</head>
<body class="select-none">
  <header class="flex items-center gap-2 p-2 bg-opacity-40 backdrop-blur-md fixed top-0 left-0 w-full z-50" aria-label="Main toolbar">
    <button id="addBtn" class="px-3 py-1 rounded bg-indigo-500 text-white hover:bg-indigo-600" aria-label="Add task">+ Task</button>
    <button id="exportBtn" class="px-3 py-1 rounded bg-emerald-500 text-white hover:bg-emerald-600" aria-label="Export tasks">Backup</button>
    <button id="importBtn" class="px-3 py-1 rounded bg-amber-500 text-white hover:bg-amber-600" aria-label="Import tasks">Restore</button>
    <button id="orbitBtn" class="ml-auto px-3 py-1 rounded bg-purple-500 text-white hover:bg-purple-600" aria-label="Toggle orbit">Orbit</button>
    <button id="themeBtn" class="px-3 py-1 rounded bg-gray-800 text-white hover:bg-gray-700" aria-label="Toggle theme">🌗</button>
  </header>
  <main id="canvas" class="relative w-full h-full pt-14 touch-none" aria-live="polite"></main>
  <script src="app.js" defer></script>
</body>
</html>
